name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install
        run: bun install --frozen-lockfile || bun install
      - name: Check types
        run: bun run check-types
      - name: Test
        run: bun test
